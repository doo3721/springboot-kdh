plugins {
    id 'java'
    id 'org.springframework.boot' version '4.1.0'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'net.likelion.bebc25'
version = '0.0.1-SNAPSHOT'
description = 'demo'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Source: https://mvnrepository.com/artifact/org.springframework.boot/spring-boot-starter-aspectj
    implementation 'org.springframework.boot:spring-boot-starter-aspectj'
    // Source: https://mvnrepository.com/artifact/org.projectlombok/lombok
    compileOnly 'org.projectlombok:lombok'  // 컴파일 시점에 롬복 어노테이션 API 사용
    annotationProcessor 'org.projectlombok:lombok'  // 컴파일 빌드 단계에서 롬복 어노테이션 프로세서를 구동하여 코드 자동 생성
    testCompileOnly 'org.projectlombok:lombok'  // 테스트 환경 컴파일 시점
    testAnnotationProcessor 'org.projectlombok:lombok'  // 테스트 환경 컴파일 빌드 단계에서 코드 자동 생성

    implementation 'org.springframework.boot:spring-boot-starter'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
