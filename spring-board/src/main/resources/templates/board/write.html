<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>스프링 게시판 - 새 글 쓰기</title>
  <link rel="stylesheet" href="/board/css/common.css">
  <link rel="stylesheet" href="/board/css/write.css">
</head>
<body>
  <div class="container">
    <th:block th:replace="~{layout/common :: nav-header(${postForm.id == 0} ? '게시글 등록' : '게시글 수정')}">
      <h1>타이틀</h1>
      <div class="nav">
        <!--      <a href="list.html">목록으로</a>-->
        <!--      <a href="write.html">새 글 쓰기</a>-->
        <!--      <a href="/">홈으로</a>-->
      </div>
    </th:block>

    <form th:action="@{${postForm.id == 0 ? 'new' : 'edit'}}" method="POST" th:object="${postForm}">
      <input type="hidden" th:field="*{id}">
      <div class="form-group">
        <label for="title">제목</label>
        <input type="text" th:field="*{title}" placeholder="제목을 입력하세요" required>
        <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">에러 메세지</div>
      </div>

      <div class="form-group">
        <label for="author">작성자</label>
        <input type="text" th:field="*{author}" placeholder="작성자 이름을 입력하세요" required>
        <div class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">에러 메세지</div>
      </div>

      <div class="form-group">
        <label for="content">내용</label>
        <textarea th:field="*{content}" rows="10" placeholder="내용을 입력하세요" required></textarea>
        <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">에러 메세지</div>
      </div>

      <div style="margin-top: 20px;">
        <button type="submit" class="btn" th:text="${postForm.id == 0 ? '등록' : '수정'}">등록</button>
        <a th:href="@{${postForm.id == 0} ? 'list.html' : 'detail.html?id=' + ${postForm.id}}" class="btn btn-secondary">취소</a>
      </div>
    </form>
  </div>
</body>
</html>
